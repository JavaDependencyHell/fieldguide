# tag::n11-yarn-scopes[]
# Yarn's origin-aware model: default registry public, @acme scope pinned private.
npmRegistryServer: "http://127.0.0.1:4873/"
npmScopes:
  acme:
    npmRegistryServer: "http://127.0.0.1:4874/"
    npmMinimalAgeGate: 0  # the age-gate is per-scope; the global key does not cascade
# end::n11-yarn-scopes[]
unsafeHttpWhitelist:
  - "127.0.0.1"
npmMinimalAgeGate: 0
nodeLinker: node-modules
enableTelemetry: false
