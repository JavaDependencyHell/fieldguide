project:
  type: book
  output-dir: build/book

filters:
  - include-code.lua

format:

  html:
    toc-depth: 1
    mermaid:
      theme: neutral
    number-sections: true
  pdf:
    number-sections: true
    number-depth: 2
    toc-depth: 1
    toc: true
    fontsize: 11.5pt
    documentclass: scrbook

    theme: [default, custom.scss]
    keep-tex: false
    papersize: A5
    fig-width: 4.4
    fig-height: 3.0
    mermaid-format: png

    classoption:
      - DIV=12
      - openany
    geometry:
      - top=18mm
      - bottom=20mm
      - left=18mm
      - right=18mm
    mermaid:
      theme: neutral
    include-in-header:
      - latex/watermark.tex
      - latex/cover.tex
      - latex/back.tex
      - latex/toc.tex
      - latex/chapter-style.tex
      - latex/typography-common.tex
      - latex/a5-tuning.tex
book:
  title: "Dependency Hell"
  chapters:
    - index.md
    - book/content/triage.md
    - book/content/classpath-reality-check.md
    - book/content/scenarios.md
    - book/content/start_here_trouble.qmd
    - book/content/start_here_control.qmd
    - book/content/authors.md
    - book/content/sponsors.md
    - part: "Maven Scenarios"
