project:
  type: book
  output-dir: build/book

filters:
  - include-code.lua

format:
  html:
    toc-depth: 1
    mermaid:
      theme: neutral
    number-sections: true
  pdf:
    number-sections: true
    toc-depth: 1
    papersize: statement
    theme: [default, custom.scss]
    keep-tex: true
    mermaid:
      theme: neutral
    include-in-header:
      text: |
        \usepackage{draftwatermark}
        \SetWatermarkText{DRAFT}
        \SetWatermarkScale{2}
        \SetWatermarkColor[gray]{0.95}
        \makeatletter
        \@addtoreset{chapter}{part}
        \makeatother

book:
  title: "Dependency Hell"
  chapters:
    - index.md
    - book/content/intro.md
    - book/content/how-to-use.md
    - book/content/authors.md
    - book/content/sponsors.md
    - part: "Maven Scenarios"
      chapters:
        - demos/maven-demo/scenario-1-basic/guide.qmd
        - demos/maven-demo/scenario-2-conflict/guide.qmd
        - demos/maven-demo/scenario-3-mgmt/guide.qmd
        - demos/maven-demo/scenario-4-override/guide.qmd
        - demos/maven-demo/scenario-5-exclusions/guide.qmd
        - demos/maven-demo/scenario-6-forcing/guide.qmd
