        - demos/maven-demo/scenario-10-circular/guide.qmd
        - demos/maven-demo/scenario-16-private-bom/guide.qmd
        - demos/maven-demo/scenario-17-private-patch/guide.qmd
    - part: "Gradle Scenarios"
