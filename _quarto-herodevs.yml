# ============================================================================
# _quarto-herodevs.yml
# HeroDevs-branded HTML build profile for fieldguide.herodevs.com
#
# Usage:
#   quarto render --profile herodevs
#
# This profile overrides the HTML format settings to use the HeroDevs light
# theme (matching docs.herodevs.com), branded header/footer, and site-specific
# options. The PDF format and book chapter list are inherited from the base
# _quarto.yml.
# ============================================================================

project:
  output-dir: build/herodevs-site

format:
  html:
    theme:
      light: book/herodevs-theme.scss
    toc-depth: 2
    number-sections: false
    include-before-body: book/_herodevs-header.html
    include-after-body: book/_herodevs-footer.html
    mermaid:
      theme: default
    code-block-bg: "#f9f9f9"
    code-block-border-left: "#990187"
    highlight-style: github
    mainfont: "ui-sans-serif, system-ui, -apple-system, sans-serif"
    monofont: "ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
    fontsize: "16px"
    linestretch: 1.65
    backgroundcolor: "#ffffff"
    fontcolor: "#202020"
    linkcolor: "#990187"

book:
  title: "Dependency Hell"
  site-url: https://fieldguide.herodevs.com
  repo-url: https://github.com/herodevs/fieldguide
  repo-actions: [issue]
  search: true
  sidebar:
    collapse-level: 1
    style: floating
  navbar:
    background: "#ffffff"
    foreground: "#202020"
    left:
      - text: "HeroDevs"
        href: https://www.herodevs.com
    right:
      - icon: github
        href: https://github.com/herodevs/fieldguide
      - text: "Get the PDF"
        href: https://www.herodevs.com/fieldguide
    page-footer:
      left: "© 2026 Dependency Hell Authors"
      center: "Sponsored by [HeroDevs](https://www.herodevs.com)"
      right: "[Get the PDF](https://www.herodevs.com/fieldguide)"
